services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  postgres-data:
